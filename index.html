<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>AI Search Explorer</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #1e1b4b;
            --primary-glow: #6366f1;
            --secondary-glow: #8b5cf6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
            /* Reseteado para evitar que el texto sea invisible en fondos blancos del widget */
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        .glow-circle {
            position: absolute;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }

        .glow-1 {
            background: var(--primary-glow);
            top: -10%;
            left: -10%;
        }

        .glow-2 {
            background: var(--secondary-glow);
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, -50px) scale(1.1);
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
            animation: fadeIn 1s ease-out;
            color: white;
            /* Color reubicado aquí para mantener el diseño principal */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            margin-top: 0;
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #a5b4fc, #c4b5fd);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* Search Input */
        .search-wrapper {
            position: relative;
            width: 100%;
        }

        #searchWidgetTrigger {
            width: 100%;
            padding: 1.2rem 1.5rem;
            padding-left: 3.5rem;
            font-size: 1.1rem;
            color: white;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            cursor: pointer;
            /* Importante para que luzca cliqueable */
            text-align: left;
            display: flex;
            align-items: center;
        }

        #searchWidgetTrigger:hover,
        #searchWidgetTrigger:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
            transform: translateY(-2px);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #818cf8;
            width: 20px;
            height: 20px;
        }

        /* Customizing the Gen-App-Builder if needed */
        gen-search-widget {
            /* Variables based on documentation if applicable to match dark theme */
            --gen-search-background-color: #0f172a;
            --gen-search-text-color: #f8fafc;
        }
    </style>
</head>

<body>
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>

    <div class="container">
        <h1>AI Search Explorer</h1>
        <p class="subtitle">Encuentra respuestas inteligentes al instante con Gen App Builder.</p>

        <div class="search-wrapper">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <!-- Element that opens the widget on click -->
            <button id="searchWidgetTrigger">
                Haz clic aquí para abrir el buscador avanzado...
            </button>
        </div>
    </div>

    <!-- Widget JavaScript bundle -->
    <script src="https://cloud.google.com/ai/gen-app-builder/client?hl=es_419"></script>

    <!-- Search widget element -->
    <gen-search-widget configId="db2f2789-2fb1-4c3a-aac4-3b98f46b9756" location="us" triggerId="searchWidgetTrigger">
    </gen-search-widget>

    <!-- Script para forzar Tema Oscuro en el componente cerrado de Google -->
    <script>
        // 1. Indicar preferencia global
        document.documentElement.style.setProperty('color-scheme', 'dark');

        document.addEventListener('DOMContentLoaded', () => {
            const forceDarkTheme = () => {
                const widget = document.querySelector('gen-search-widget');
                if (widget) {
                    // Try setting various common theme attributes
                    widget.setAttribute('colorTheme', 'dark');
                    widget.setAttribute('theme', 'dark');
                    widget.setAttribute('data-theme', 'dark');
                    widget.setAttribute('color-mode', 'dark');
                    
                    // Si el Shadow DOM está abierto o disponible, inyectar el modo oscuro
                    if (widget.shadowRoot) {
                        let style = widget.shadowRoot.querySelector('#force-dark-style');
                        if (!style) {
                            style = document.createElement('style');
                            style.id = 'force-dark-style';
                            
                            // Forzados para Google Material Design Web y estilos nativos del widget
                            style.textContent = `
                                *, :host, main, article, section, div {
                                    --mdc-dialog-box-shadow: 0 24px 38px 3px rgba(0,0,0,0.5);
                                    --mdc-theme-surface: #0f172a !important;
                                    --mdc-theme-on-surface: #f8fafc !important;
                                    --mdc-theme-background: #0f172a !important;
                                    --mdc-theme-text-primary-on-background: #f8fafc !important;
                                    color: #f8fafc !important;
                                }
                                .search-container, .gen-search-container, dialog, .dialog, md-dialog {
                                    background-color: #0f172a !important;
                                    background: #0f172a !important;
                                }
                                input, textarea {
                                    background-color: #1e293b !important;
                                    color: white !important;
                                }
                            `;
                            widget.shadowRoot.appendChild(style);
                        }
                    }
                }
            };

            // Ejecutar forzado varias veces por la carga asíncrona del script oficial
            forceDarkTheme();
            setTimeout(forceDarkTheme, 500);
            setTimeout(forceDarkTheme, 2000);

            // También ejecutar cuando se interactúe con el botón
            document.getElementById('searchWidgetTrigger').addEventListener('click', () => {
                setTimeout(forceDarkTheme, 50);
                setTimeout(forceDarkTheme, 300);
                setTimeout(forceDarkTheme, 1000);
            });
        });
    </script>
</body>

</html>
